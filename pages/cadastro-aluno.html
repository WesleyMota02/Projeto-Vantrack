<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Aluno - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/style-aluno.css">
</head>
<body>
    <!-- Padrão decorativo de mapa nas bordas -->
    <div class="map-bg-pattern">
        <span class="pattern-top-right">⬆️ ⭐ 🧭</span>
        <span class="pattern-bottom-left">⭐ 🧭 📍</span>
    </div>

    <div id="notificacoes" class="container-notificacoes"></div>
    <main id="tela-cadastro">
        <div class="conteudo-cadastro">
            <header class="topo-cadastro">
                <img src="../assets/img/aluno.png" alt="Ícone aluno" class="icone-motorista">
                <h1>Cadastro Aluno</h1>
            </header>
            <section id="card-cadastro">
                <form id="form-cadastro-aluno" autocomplete="off">
                    <div class="campo">
                        <i class="fas fa-user"></i>
                        <input type="text" id="nome" name="nome" data-validar="nome" placeholder="Nome Completo" required>
                    </div>
                    <div class="campo">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="cpf" name="cpf" data-validar="cpf" placeholder="CPF" required>
                    </div>
                    <div class="campo">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" data-validar="email" placeholder="E-mail" required>
                    </div>
                    <div class="campo">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="telefone" name="telefone" data-validar="telefone" placeholder="Telefone" required>
                    </div>
                    <div class="campo">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="cidade" name="cidade" data-validar="cidade" placeholder="Cidade" required>
                    </div>
                    <div class="campo">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" name="senha" data-validar="senha" placeholder="Senha" required>
                        <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="campo">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmar-senha" name="confirmar-senha" data-validar="senha" placeholder="Confirmar Senha" required>
                        <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn-cadastrar">Cadastrar</button>
                </form>
            </section>
        </div>
    </main>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
