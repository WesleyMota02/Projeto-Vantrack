<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha de Perfil - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/escolha.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <main class="tela-escolha">
        <section class="conteudo-escolha">
            <header class="texto-escolha">
                <h1>Escolha uma Opção</h1>
                <p>Selecione seu perfil para continuar.</p>
            </header>
            <div class="cards-perfil">
                <a href="cadastro-motorista.html" class="card-perfil">
                    <div class="icone-perfil">
                        <img src="../assets/img/motorista.png" alt="Motorista">
                    </div>
                    <span class="nome-perfil">Motorista</span>
                </a>
                <a href="cadastro-aluno.html" class="card-perfil">
                    <div class="icone-perfil">
                        <img src="../assets/img/aluno.png" alt="Aluno">
                    </div>
                    <span class="nome-perfil">Aluno</span>
                </a>
            </div>
        </section>
    </main>
    <script src="../assets/js/config.js"></script>
</body>
</html>
