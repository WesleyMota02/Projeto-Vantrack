<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/perfil.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <nav class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">Vantrack</h1>
            <ul class="navbar-menu">
                <li><a href="perfil.html" class="active">Perfil</a></li>
                <li><a href="gps.html">GPS</a></li>
                <li><button id="btn-logout" class="btn-logout">Sair</button></li>
            </ul>
        </div>
    </nav>
    <main class="perfil-container">
        <div class="perfil-card">
            <header class="perfil-header">
                <h1>Meu Perfil</h1>
                <p>Gerencie suas informações de conta</p>
            </header>
            <div class="perfil-conteudo">
                <div class="campo-perfil">
                    <label>Nome</label>
                    <input type="text" id="nome" disabled>
                </div>
                <div class="campo-perfil">
                    <label>E-mail</label>
                    <input type="email" id="email" disabled>
                </div>
                <div class="campo-perfil">
                    <label>Telefone</label>
                    <input type="tel" id="telefone" disabled>
                </div>
                <div class="campo-perfil">
                    <label>Cidade</label>
                    <input type="text" id="cidade" disabled>
                </div>
                <div class="campo-perfil">
                    <label>Tipo de Perfil</label>
                    <input type="text" id="tipo-perfil" disabled>
                </div>
                <button id="btn-editar" class="btn-editar">Editar</button>
            </div>
        </div>
    </main>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            const usuario = getUser();
            if (usuario) {
                document.getElementById('nome').value = usuario.nome || '';
                document.getElementById('email').value = usuario.email || '';
                document.getElementById('telefone').value = usuario.telefone || '';
                document.getElementById('cidade').value = usuario.cidade || '';
                document.getElementById('tipo-perfil').value = usuario.tipo_perfil === 'aluno' ? 'Aluno' : 'Motorista';
            }
            document.getElementById('btn-logout').addEventListener('click', logout);
            document.getElementById('btn-editar').addEventListener('click', () => alert('Edição em desenvolvimento'));
        });
    </script>
</body>
</html>
