<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.17.0-beta.1/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/gps.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <nav class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">Vantrack GPS</h1>
            <ul class="navbar-menu">
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="gps.html" class="active">GPS</a></li>
                <li><button id="btn-logout" class="btn-logout">Sair</button></li>
            </ul>
        </div>
    </nav>
    <div class="gps-container">
        <div class="mapa-section">
            <div id="mapa" class="mapa-widget"></div>
        </div>
        <div class="controles-section">
            <div class="controles-card">
                <h2>Localização em Tempo Real</h2>
                <div class="veiculo-selector">
                    <label for="veiculo-id">Veículo:</label>
                    <input type="number" id="veiculo-id" placeholder="ID do Veículo" value="1">
                </div>
                <div class="coordenadas-display">
                    <p>Latitude: <span id="latitude-display">--</span></p>
                    <p>Longitude: <span id="longitude-display">--</span></p>
                    <p>Hora: <span id="hora-display">--</span></p>
                </div>
                <div class="botoes-acao">
                    <button id="btn-registrar" class="btn-primary">Registrar Localização</button>
                    <button id="btn-atualizar" class="btn-secondary">Atualizar Histórico</button>
                </div>
            </div>
            <div class="historico-section">
                <h2>Histórico de Localizações</h2>
                <div id="container-historico" class="historico-container">
                    <table id="tabela-historico" class="tabela-historico">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Hora</th>
                                <th>Latitude</th>
                                <th>Longitude</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.17.0-beta.1/mapbox-gl.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/gps.js"></script>
</body>
</html>
