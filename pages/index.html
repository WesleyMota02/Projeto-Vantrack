<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <!-- Padrão decorativo de mapa nas bordas -->
    <div class="map-bg-pattern">
        <span class="pattern-top-right">⬆️ ⭐ 🧭</span>
        <span class="pattern-bottom-left">⭐ 🧭 📍</span>
    </div>

    <div id="notificacoes" class="container-notificacoes"></div>
    <div class="login-container">
        <div class="login-header">
            <img src="../assets/img/van.png.png" alt="Vantrack Logo" class="logo-van">
            <h1>Bem-vindo<br>ao Vantrack</h1>
        </div>
        <div class="login-card">
            <form id="form-login">
                <div class="form-group">
                    <div class="input-com-icone">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" data-validar="email" placeholder="E-mail" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-com-icone">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" name="senha" data-validar="senha" placeholder="Senha" required>
                        <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <div class="dropdown-perfil">
                        <div class="dropdown-header input-com-icone">
                            <i class="fas fa-user-circle"></i>
                            <span id="perfil-display" class="perfil-display">Selecione seu perfil</span>
                            <i class="fas fa-chevron-down dropdown-icon"></i>
                        </div>
                        <ul class="dropdown-list" id="dropdown-perfil-list" style="display: none;">
                            <li class="dropdown-item" data-value="aluno">Aluno</li>
                            <li class="dropdown-item" data-value="motorista">Motorista</li>
                        </ul>
                        <input type="hidden" id="perfil" name="perfil" value="">
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="lembrar" name="lembrar">
                    <label for="lembrar">Lembrar-me</label>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
        <div class="login-footer">
            <a href="recuperar-senha.html" class="link-footer">Esqueci minha senha?</a>
            <a href="escolha.html" class="link-footer">Ainda não tem conta? Cadastre-se</a>
        </div>
    </div>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
