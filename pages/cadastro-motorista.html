<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Motorista - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/Style.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <main id="tela-cadastro">
        <div class="conteudo-cadastro">
            <header class="topo-cadastro">
                <img src="../assets/img/motorista.png" alt="Ícone motorista" class="icone-motorista">
                <h1>Cadastro Motorista</h1>
            </header>
            <section id="card-cadastro">
                <form id="form-cadastro-motorista" autocomplete="off">
                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" id="nome" name="nome" data-validar="nome" placeholder="Nome Completo" required>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">assignment_ind</span>
                        <input type="text" id="cpf" name="cpf" data-validar="cpf" placeholder="CPF" required>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">mail</span>
                        <input type="email" id="email" name="email" data-validar="email" placeholder="E-mail" required>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">call</span>
                        <input type="tel" id="telefone" name="telefone" data-validar="telefone" placeholder="Telefone" required>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">location_city</span>
                        <input type="text" id="cidade" name="cidade" data-validar="cidade" placeholder="Cidade" required>
                    </div>
                    <div class="campo campo-senha">
                        <span class="material-symbols-outlined">lock</span>
                        <input type="password" id="senha" name="senha" data-validar="senha" placeholder="Senha" required>
                        <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="campo campo-senha">
                        <span class="material-symbols-outlined">lock_check</span>
                        <input type="password" id="confirmar-senha" name="confirmar-senha" data-validar="senha" placeholder="Confirmar Senha" required>
                    </div>
                    <button type="submit" class="btn-cadastrar">Cadastrar como Motorista</button>
                    <p class="login-link">Já possui conta? <a href="index.html">Faça login</a></p>
                </form>
            </section>
        </div>
    </main>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
