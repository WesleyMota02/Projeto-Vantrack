<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/recuperar-senha.css">
</head>
<body>
    <!-- Padrão decorativo de mapa nas bordas -->
    <div class="map-bg-pattern">
        <span class="pattern-top-right">⬆️ ⭐ 🧭</span>
        <span class="pattern-bottom-left">⭐ 🧭 📍</span>
    </div>

    <div id="notificacoes" class="container-notificacoes"></div>
    
    <div class="container-recuperar">
        <div class="header-recuperar">
            <div class="logo-recuperar">
                <span class="logo-bus">🚌</span>
                <span class="logo-bus">🚌</span>
            </div>
            <h1>Recuperar Senha</h1>
            <p>Digite seu endereço de e-mail para receber instruções para redefinir sua senha.</p>
        </div>
        
        <div class="form-card-recuperar">
            <form id="form-recuperar-senha">
                <div class="input-group-recuperar">
                    <i class="fas fa-envelope icon-email"></i>
                    <input type="email" id="email-recuperar" name="email" data-validar="email" placeholder="E-mail" required>
                </div>
                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
