<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/recuperar-senha.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <div class="container">
        <div class="header">
            <div class="logo-recuperar">
                <img src="../assets/img/van.png.png" alt="Logo Vantrack" class="logo-bus-img">
                <h1>Recuperar Senha</h1>
            </div>
            <p>Digite seu e-mail e a nova senha para redefinir sua conta.</p>
        </div>
        <div class="form-card">
            <form id="form-recuperar-senha">
                <div class="input-group">
                    <i class="fas fa-envelope icon-email"></i>
                    <input type="email" id="email-recuperar" name="email" data-validar="email" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="nova-senha" name="nova-senha" data-validar="senha" placeholder="Nova Senha" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock-open"></i>
                    <input type="password" id="confirmar-senha-recuperar" name="confirmar-senha" data-validar="senha" placeholder="Confirmar Senha" required>
                </div>
                <button type="submit" class="btn-enviar">Recuperar Senha</button>
                <p class="voltar-login"><a href="index.html">Voltar ao Login</a></p>
            </form>
        </div>
    </div>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
