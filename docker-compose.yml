# ==============================================================================
# 🐳 VANTRACK - DOCKER COMPOSE CONFIGURATION
# ==============================================================================
#
# INICIALIZAÇÃO RÁPIDA:
# Execute este comando para levantar o banco de dados MySQL pronto:
#
#   docker-compose up -d
#
# O banco de dados será criado com:
# • Imagem: MySQL 8.0
# • Database: vantrack
# • Usuário root: root (senha: root)
# • Porta: 3306
# • Volumes: Persistência automática + Schema auto-inicializado
#
# COMANDOS ÚTEIS:
#   docker-compose up -d          → Inicia em background
#   docker-compose logs -f db     → Ver logs em tempo real
#   docker-compose down           → Para e remove containers
#   docker-compose restart db     → Reinicia o MySQL
#   docker ps                     → Ver containers rodando
#
# VERIFICAR CONEXÃO:
#   mysql -h localhost -u root -proot -e "USE vantrack; SHOW TABLES;"
#
# ==============================================================================

version: '3.8'

services:
  # 🗄️ Serviço MySQL Database
  db:
    image: mysql:8.0
    container_name: vantrack_mysql
    
    # Variáveis de Ambiente para Inicialização
    environment:
      # Senha do usuário root (padrão de desenvolvimento)
      MYSQL_ROOT_PASSWORD: root
      
      # Banco de dados padrão (será criado automaticamente)
      MYSQL_DATABASE: vantrack
      
      # Configuração de encoding UTF-8 para suportar acentos e caracteres especiais
      MYSQL_INITDB_ARGS: "--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    
    # Mapeamento de Portas
    # Formato: <porta-externa>:<porta-interna>
    # Acesso local: localhost:3306
    ports:
      - "3306:3306"
    
    # Volumes - A Mágica da Persistência e Auto-Inicialização
    volumes:
      # 1️⃣ PERSISTÊNCIA DE DADOS
      #    Salva os dados do MySQL em ./docker/mysql/data/
      #    Sobrevive reinicializações do container
      #    Sem isso, perderíamos todos os dados quando o container fosse parado
      - ./docker/mysql/data:/var/lib/mysql
      
      # 2️⃣ AUTO-INICIALIZAÇÃO DO SCHEMA
      #    Arquivo SQL executado apenas na PRIMEIRA inicialização do container
      #    /docker-entrypoint-initdb.d/ é a pasta especial do MySQL
      #    Todos os .sql nessa pasta são executados automaticamente
      #    Nosso schema.sql cria as 10 tabelas necessárias
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    
    # Configurações Avançadas
    healthcheck:
      # Comando para verificar se o MySQL está saudável
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      # Intervalo entre verificações
      interval: 10s
      # Tempo máximo para o comando responder
      timeout: 5s
      # Tentativas antes de marcar como "unhealthy"
      retries: 5
      # Delay inicial antes de começar verificações
      start_period: 30s
    
    # Restart policy
    restart: unless-stopped
    
    # Limites de recurso (opcional, remova se tiver máquina fraca)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M

# ==============================================================================
# INSTRUÇÕES DE USO COMPLETO:
# ==============================================================================
#
# 1. PRIMEIRO USO (Criar tudo do zero):
#    $ docker-compose up -d
#    → Baixa a imagem MySQL 8.0
#    → Cria o container 'vantrack_mysql'
#    → Executa schema.sql automaticamente
#    → Cria volumes para persistência
#
# 2. VERIFICAR SE ESTÁ RODANDO:
#    $ docker ps
#    → Deve aparecer: vantrack_mysql  RUNNING
#
# 3. CONECTAR AO BANCO DE DADOS:
#    Com MySQL CLI:
#    $ mysql -h localhost -u root -proot
#    $ USE vantrack;
#    $ SHOW TABLES;
#
#    Com Python (backend):
#    A aplicação conecta automaticamente em localhost:3306
#    Com usuário 'root' e senha 'root'
#
# 4. VER LOGS DO CONTAINER:
#    $ docker-compose logs -f db
#
# 5. PARAR O BANCO:
#    $ docker-compose down
#    → Para o container mas PRESERVA os dados em ./docker/mysql/data/
#
# 6. APAGAR TUDO (incluindo dados):
#    $ docker-compose down -v
#    → CUIDADO: Remove volumes, perdendo todos os dados!
#
# 7. REINICIAR (se precisar resetar):
#    $ docker-compose restart db
#    → Para e inicia novamente, preservando dados
#
# ==============================================================================
