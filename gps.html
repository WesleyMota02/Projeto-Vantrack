<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS - Vantrack</title>

  <!-- CSS do Mapbox (CDN oficial) -->
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.17.0-beta.1/mapbox-gl.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/gps.css" />
</head>
<body>
  <div class="app-container">
    <!-- Barra superior -->
    <header class="topbar">
      <span class="topbar-title">GPS</span>
    </header>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Caixa de pesquisa sobre o mapa -->
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input
        type="text"
        placeholder="Pesquise aqui..."
        id="campo-pesquisa"
      />
    </div>
  </div>

  <!-- JS do Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.17.0-beta.1/mapbox-gl.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/validators.js"></script>
  <script src="assets/js/ui-feedback.js"></script>
  <script src="assets/js/gps.js"></script>
</body>
</html>
