<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="assets/img/van.png.png" alt="Vantrack Logo" class="logo">
                <h1>Vantrack</h1>
            </div>

            <form id="form-login" method="POST">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="senha-group">
                        <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
                        <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="login-options">
                <a href="pages/recuperar-senha.html" class="link-recuperar">Esqueceu a senha?</a>
            </div>

            <div class="divider">ou</div>

            <a href="pages/escolha.html" class="btn-cadastro">Criar Conta</a>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/validators.js"></script>
    <script src="assets/js/ui-feedback.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
